<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Resources · Community Corp Santa Monica</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #1a5276;
    --sky: #2e86c1;
    --sand: #fdf6ec;
    --sun: #f0a500;
    --coral: #e05c3a;
    --mint: #d4efdf;
    --text: #1c1c1c;
    --muted: #6b7280;
    --card: #ffffff;
    --border: #e5e7eb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ocean);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 18px 20px 14px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .org-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 700;
    line-height: 1.1;
  }

  h1 .sub {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.55em;
    font-weight: 300;
    opacity: 0.8;
    margin-top: 3px;
    letter-spacing: 0.02em;
  }


  .header-logo {
    height: 52px;
    width: auto;
    display: block;
    filter: brightness(0) invert(1);
    margin-bottom: 6px;
  }

  @media (max-width: 500px) {
    .header-logo { height: 40px; }
  }
  .lang-toggle {
    display: flex;
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .lang-toggle button {
    background: none;
    border: none;
    color: white;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .lang-toggle button.active {
    background: rgba(255,255,255,0.25);
    border-radius: 6px;
  }

  /* ── SEARCH + FILTER ── */
  .controls {
    max-width: 900px;
    margin: 28px auto 0;
    padding: 0 16px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 18px 14px 48px;
    border: 2px solid var(--border);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    background: white;
    outline: none;
    transition: border-color 0.2s;
    color: var(--text);
  }

  .search-wrap input:focus { border-color: var(--sky); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
  }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding-bottom: 4px;
  }

  .filter-btn {
    border: 2px solid var(--border);
    background: white;
    border-radius: 999px;
    padding: 7px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    color: var(--text);
  }

  .filter-btn:hover { border-color: var(--sky); color: var(--sky); }

  .filter-btn.active {
    background: var(--ocean);
    border-color: var(--ocean);
    color: white;
  }

  /* ── CATEGORY DOTS ── */
  .cat-dot {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    margin-right: 6px;
    flex-shrink: 0;
  }
  .cat-Food { background: #e05c3a; }
  .cat-Mental { background: #7b5ea7; }
  .cat-Rental { background: #2e86c1; }
  .cat-Legal { background: #1a5276; }
  .cat-Benefits { background: #f0a500; }
  .cat-Other { background: #6b7280; }

  /* ── RESOURCE GRID ── */
  .results-info {
    max-width: 900px;
    margin: 20px auto 10px;
    padding: 0 16px;
    font-size: 13px;
    color: var(--muted);
  }

  .grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: 16px;
    border: 1.5px solid var(--border);
    padding: 20px;
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeUp 0.35s ease both;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card:hover {
    box-shadow: 0 8px 28px rgba(26,82,118,0.1);
    transform: translateY(-2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .icon-Food    { background: #fde8e2; }
  .icon-Mental  { background: #ede7f6; }
  .icon-Rental  { background: #dbeafe; }
  .icon-Legal   { background: #dbeafe; }
  .icon-Benefits{ background: #fef3c7; }
  .icon-Other   { background: #f3f4f6; }

  .card-name {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.25;
    color: var(--ocean);
  }

  .card-category {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-desc {
    font-size: 14px;
    line-height: 1.55;
    color: #374151;
  }

  .card-details {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 2px;
    font-size: 13px;
    color: var(--muted);
  }

  .card-detail {
    display: flex;
    align-items: flex-start;
    gap: 7px;
  }

  .card-detail span.icon { flex-shrink: 0; }

  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .btn-call, .btn-web {
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: opacity 0.15s;
  }

  .btn-call { background: var(--mint); color: #155724; }
  .btn-web  { background: #dbeafe;    color: #1e40af; }
  .btn-call:hover, .btn-web:hover { opacity: 0.8; }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    color: var(--ocean);
    margin-bottom: 8px;
  }

  /* ── LOADING ── */
  .loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--sky);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ── */
  footer {
    background: var(--ocean);
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 24px 16px;
    font-size: 13px;
    margin-top: 20px;
  }

  footer a { color: rgba(255,255,255,0.9); }

  /* ── NOTICE BANNER ── */
  .notice {
    background: #fef3c7;
    border-left: 4px solid var(--sun);
    max-width: 900px;
    margin: 16px auto 0;
    padding: 12px 16px;
    border-radius: 0 10px 10px 0;
    font-size: 13px;
    color: #78350f;
    display: none;
  }

  .notice.show { display: block; }

  @media (max-width: 500px) {
    h1 { font-size: 1.35rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

async function loadData() {
  if (!SHEET_URL) {
    document.getElementById('demo-notice').classList.add('show');
    resources = SAMPLE;
    buildFilters();
    renderCards();
    return;
  }
  showLoading();
  try {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    resources = parseCSV(csv);
    buildFilters();
    renderCards();
  } catch (e) {
    document.getElementById('demo-notice').classList.add('show');
    resources = SAMPLE;
    buildFilters();
    renderCards();
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
  return lines.slice(1).map(line => {
    const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g) || [];
    const obj = {};
    headers.forEach((h, i) => {
      obj[h] = (vals[i] || '').replace(/^"|"$/g,'').trim();
    });
    return obj;
  }).filter(r => r.name || r.Name);
}

// ─────────────────────────────────────────────
//  FILTERS
// ─────────────────────────────────────────────
function buildFilters() {
  const categories = ['All', ...new Set(resources.map(r => r.category || r.Category || 'Other'))];
  const container = document.getElementById('filters');
  container.innerHTML = categories.map(cat => `
    <button class="filter-btn ${cat === activeCategory ? 'active' : ''}"
      onclick="setCategory('${cat}')">
      ${cat === 'All' ? T[lang].all : (CAT_LABELS[lang][cat] || cat)}
    </button>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  buildFilters();
  renderCards();
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderCards() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const grid = document.getElementById('grid');

  const filtered = resources.filter(r => {
    const cat = r.category || r.Category || 'Other';
    const matchCat = activeCategory === 'All' || cat === activeCategory;
    const name = (lang === 'es' && r.name_es ? r.name_es : r.name || r.Name || '').toLowerCase();
    const desc = (lang === 'es' && r.description_es ? r.description_es : r.description || r.Description || '').toLowerCase();
    const matchQ = !query || name.includes(query) || desc.includes(query) || cat.toLowerCase().includes(query);
    return matchCat && matchQ;
  });

  document.getElementById('results-info').textContent = T[lang].showing(filtered.length);

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
      <h3>${T[lang].noResults}</h3>
      <p>${T[lang].noResultsSub}</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map((r, i) => {
    const cat = r.category || r.Category || 'Other';
    const catKey = cat.charAt(0).toUpperCase() + cat.slice(1).split(' ')[0];
    const name = lang === 'es' && r.name_es ? r.name_es : r.name || r.Name || '';
    const desc = lang === 'es' && r.description_es ? r.description_es : r.description || r.Description || '';
    const notes = lang === 'es' && r.notes_es ? r.notes_es : r.notes || r.Notes || '';
    const phone = r.phone || r.Phone || '';
    const website = r.website || r.Website || '';
    const address = r.address || r.Address || '';
    const hours = r.hours || r.Hours || '';

    return `
    <div class="card" style="animation-delay:${i*0.04}s">
      <div class="card-header">
        <div class="card-icon icon-${catKey}">${ICONS[catKey] || '🤝'}</div>
        <div>
          <div class="card-name">${name}</div>
          <div class="card-category">
            <span class="cat-dot cat-${catKey}"></span>
            ${CAT_LABELS[lang][catKey] || cat}
          </div>
        </div>
      </div>
      ${desc ? `<div class="card-desc">${desc}</div>` : ''}
      <div class="card-details">
        ${address ? `<div class="card-detail"><span class="icon">📍</span><span>${address}</span></div>` : ''}
        ${hours ? `<div class="card-detail"><span class="icon">🕐</span><span>${hours}</span></div>` : ''}
        ${notes ? `<div class="card-detail"><span class="icon">ℹ️</span><span>${notes}</span></div>` : ''}
      </div>
      <div class="card-actions">
        ${phone ? `<a class="btn-call" href="tel:${phone.replace(/\D/g,'')}">📞 ${T[lang].call} ${phone}</a>` : ''}
        ${website ? `<a class="btn-web" href="${website}" target="_blank" rel="noopener">🔗 ${T[lang].website}</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function showLoading() {
  document.getElementById('grid').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div>${T[lang].loading}</div>
    </div>`;
}

// ─────────────────────────────────────────────
//  LANGUAGE
// ─────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  document.getElementById('search').placeholder = T[l].search;
  document.getElementById('site-title').childNodes[0].textContent = T[l].siteTitle + ' ';
  document.getElementById('site-subtitle').textContent = T[l].siteSub;
  buildFilters();
  renderCards();
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
loadData();
</script>
</body>
