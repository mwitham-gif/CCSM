<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Resources · Community Corp Santa Monica</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #1a5276;
    --sky: #2e86c1;
    --sand: #eef2f7;
    --sun: #f0a500;
    --coral: #e05c3a;
    --mint: #d4efdf;
    --text: #1c1c1c;
    --muted: #6b7280;
    --card: #ffffff;
    --border: #e5e7eb;

    --c-Food:    #e05c3a;
    --c-Mental:  #7b5ea7;
    --c-Rental:  #2e86c1;
    --c-Legal:   #1a5276;
    --c-Benefits:#d48e00;
    --c-Other:   #6b7280;
    --c-Transportation: #2a9d8f;
    --c-Education: #457b9d;
    --c-Employment: #e76f51;
    --c-Childcare: #e9c46a;
    --c-Youth: #06d6a0;
    --c-Seniors: #118ab2;
    --c-Housing: #2e86c1;
    --c-Disability: #9b5de5;
    --c-Medical: #e63946;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ocean);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 18px 20px 14px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 700;
    line-height: 1.1;
  }

  h1 .sub {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.55em;
    font-weight: 300;
    opacity: 0.8;
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  .header-logo {
    height: 52px;
    width: auto;
    display: block;
    filter: brightness(0) invert(1);
    margin-bottom: 6px;
  }

  @media (max-width: 500px) { .header-logo { height: 40px; } }

  .lang-toggle {
    display: flex;
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .lang-toggle button {
    background: none;
    border: none;
    color: white;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .lang-toggle button.active {
    background: rgba(255,255,255,0.25);
    border-radius: 6px;
  }

  /* ── SEARCH + FILTER ── */
  .controls {
    max-width: 900px;
    margin: 28px auto 0;
    padding: 0 16px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 18px 14px 48px;
    border: 2px solid var(--border);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    background: white;
    outline: none;
    transition: border-color 0.2s;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .search-wrap input:focus { border-color: var(--sky); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
  }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding-bottom: 4px;
  }

  .filter-btn {
    border: 2px solid #b0bec5;
    background: white;
    border-radius: 10px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    color: #374151;
    box-shadow: 0 2px 0 #b0bec5, 0 2px 6px rgba(0,0,0,0.07);
    letter-spacing: 0.01em;
    user-select: none;
  }

  .filter-btn:hover {
    border-color: var(--sky);
    color: var(--sky);
    box-shadow: 0 2px 0 var(--sky), 0 3px 10px rgba(46,134,193,0.15);
    transform: translateY(-1px);
  }

  .filter-btn:active {
    transform: translateY(1px);
    box-shadow: 0 0px 0 #b0bec5;
  }

  .filter-btn.active {
    background: var(--ocean);
    border-color: #134261;
    color: white;
    box-shadow: 0 2px 0 #134261, 0 3px 10px rgba(26,82,118,0.25);
  }

  .filter-btn.active:hover {
    background: var(--sky);
    border-color: #1f6491;
    box-shadow: 0 2px 0 #1f6491, 0 3px 10px rgba(46,134,193,0.3);
    color: white;
  }

  /* ── RESULTS INFO ── */
  .results-info {
    max-width: 900px;
    margin: 20px auto 10px;
    padding: 0 16px;
    font-size: 13px;
    color: var(--muted);
  }

  /* ── RESOURCE GRID ── */
  .grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: 16px;
    border: 2px solid #c9d4e0;
    padding: 20px;
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeUp 0.35s ease both;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 4px 16px rgba(26,82,118,0.10), 0 1px 4px rgba(26,82,118,0.06);
  }

  .card:hover {
    box-shadow: 0 12px 36px rgba(26,82,118,0.18), 0 3px 8px rgba(26,82,118,0.10);
    transform: translateY(-2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .icon-Food    { background: #fde8e2; }
  .icon-Mental  { background: #ede7f6; }
  .icon-Rental  { background: #dbeafe; }
  .icon-Legal   { background: #dbeafe; }
  .icon-Benefits{ background: #fef3c7; }
  .icon-Other   { background: #f3f4f6; }

  .card-name {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.25;
    color: var(--ocean);
  }

  .card-category {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .cat-dot {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    margin-right: 6px;
    flex-shrink: 0;
  }
  .cat-Food    { background: #e05c3a; }
  .cat-Mental  { background: #7b5ea7; }
  .cat-Rental  { background: #2e86c1; }
  .cat-Legal   { background: #1a5276; }
  .cat-Benefits{ background: #f0a500; }
  .cat-Other   { background: #6b7280; }

  .card-desc {
    font-size: 14px;
    line-height: 1.55;
    color: #374151;
  }

  .card-details {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 2px;
    font-size: 13px;
    color: var(--muted);
  }

  .card-detail {
    display: flex;
    align-items: flex-start;
    gap: 7px;
  }

  .card-detail span.icon { flex-shrink: 0; }

  /* ── ACTION BUTTONS ROW ── */
  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .btn-call, .btn-web {
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: opacity 0.15s;
  }

  .btn-call { background: var(--mint); color: #155724; }
  .btn-web  { background: #dbeafe; color: #1e40af; box-shadow: 0 2px 0 #93c5fd, 0 2px 6px rgba(30,64,175,0.12); }
  .btn-call:hover, .btn-web:hover { opacity: 0.8; }

  /* ── REPORT BUTTON ── */
  /*
   * The report button opens a pre-filled mailto: link.
   * Update REPORT_EMAIL at the top of the <script> block with the
   * staff inbox that should receive these reports.
   */
  .card-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: auto;
  }

  .btn-report {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 11px;
    border-radius: 8px;
    border: 1.5px solid #fcd34d;
    background: transparent;
    color: #92400e;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .btn-report:hover {
    background: #fef3c7;
    border-color: #f59e0b;
  }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    color: var(--ocean);
    margin-bottom: 8px;
  }

  /* ── LOADING ── */
  .loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--sky);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ── */
  footer {
    background: var(--ocean);
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 24px 16px;
    font-size: 13px;
    margin-top: 20px;
  }

  footer a { color: rgba(255,255,255,0.9); }

  /* ── NOTICE BANNER ── */
  .notice {
    background: #fef3c7;
    border-left: 4px solid var(--sun);
    max-width: 900px;
    margin: 16px auto 0;
    padding: 12px 16px;
    border-radius: 0 10px 10px 0;
    font-size: 13px;
    color: #78350f;
    display: none;
  }

  .notice.show { display: block; }

  @media (max-width: 750px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.1rem; }
    h1 .sub { font-size: 0.6em; }
    .header-inner { padding: 10px 12px; }
    .header-logo { height: 32px; }
    .lang-toggle button { padding: 5px 10px; font-size: 12px; }
    .controls { margin-top: 14px; padding: 0 12px; }
    .search-wrap input { font-size: 16px; padding: 11px 12px 11px 40px; border-radius: 10px; }
    .filters {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 6px;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { flex-shrink: 0; font-size: 12px; padding: 8px 13px; }
    .results-info { padding: 0 12px; }
    .grid { grid-template-columns: 1fr; padding: 0 12px 48px; gap: 12px; }
    .card { padding: 16px 14px; }
    .card-name { font-size: 0.98rem; }
    .card-desc { font-size: 13px; }
    .btn-call, .btn-web { font-size: 12px; padding: 7px 11px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <img src="ccsm_logo_web.png" alt="Community Corporation of Santa Monica" class="header-logo">
        <h1 id="site-title">
          Community Resources
          <span class="sub" id="site-subtitle">Find help near you · Santa Monica</span>
        </h1>
      </div>
      <div class="lang-toggle">
        <button class="active" onclick="setLang('en')" id="btn-en">EN</button>
        <button onclick="setLang('es')" id="btn-es">ES</button>
      </div>
    </div>
  </div>
</header>

<div class="notice" id="demo-notice">
  📋 <strong>Demo mode:</strong> Showing sample data. Connect your Google Sheet by updating the <code>SHEET_URL</code> in the code.
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search resources..." oninput="renderCards()" autocomplete="off">
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="results-info" id="results-info"></div>
<div class="grid" id="grid"></div>

<footer>
  <div>Community Corporation of Santa Monica · Resident Services</div>
  <div style="margin-top:6px">Questions? Call <a href="tel:+13103950220">(310) 395-0220</a></div>
</footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// UPDATE THIS — staff inbox that receives "Report outdated info" emails
// ─────────────────────────────────────────────────────────────────────────────
const REPORT_EMAIL = 'mwitham@communitycorp.org';

const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbAtpa7kK10yL2QtdLHRx9q2VbuEIPNG6S2uMbWhQ1GsLGoYA3NqFAlp_E_w8xUGRdcLxT4V3gbiJD/pub?output=csv';

const T = {
  en: {
    search: 'Search resources...',
    all: 'All',
    showing: n => `Showing ${n} resource${n===1?'':'s'}`,
    noResults: 'No resources found',
    noResultsSub: 'Try a different search or category.',
    call: 'Call',
    website: 'Website',
    hours: 'Hours',
    address: 'Address',
    notes: 'Notes',
    loading: 'Loading resources...',
    siteTitle: 'Community Resources',
    siteSub: 'Find help near you · Santa Monica',
    reportBtn: 'Report outdated info',
    reportSubject: name => `Outdated listing: ${name}`,
    reportBody: name =>
`Hi CCSM,

I noticed some information for "${name}" on the CCSM Community Resources page may be outdated.

Please describe what is incorrect:

  },
  es: {
    search: 'Buscar recursos...',
    all: 'Todo',
    showing: n => `Mostrando ${n} recurso${n===1?'':'s'}`,
    noResults: 'No se encontraron recursos',
    noResultsSub: 'Intenta una búsqueda diferente o categoría.',
    call: 'Llamar',
    website: 'Sitio web',
    hours: 'Horario',
    address: 'Dirección',
    notes: 'Notas',
    loading: 'Cargando recursos...',
    siteTitle: 'Recursos Comunitarios',
    siteSub: 'Encuentra ayuda cerca · Santa Mónica',
    reportBtn: 'Reportar información desactualizada',
    reportSubject: name => `Información desactualizada: ${name}`,
    reportBody: name =>
`Hola,

Noté que la información de "${name}" en la página de Recursos Comunitarios puede estar desactualizada.

Qué está incorrecto:
[Por favor describa — ej. número de teléfono incorrecto, dirección cambió, horario diferente, programa ya no existe]

Gracias por mantener este recurso actualizado.`,
  }
};

const SAMPLE = [
  { name:'Westside Food Bank', name_es:'Banco de Alimentos del Oeste', category:'Food', description:'Free groceries and pantry items for Santa Monica residents. No ID required.', description_es:'Comida gratis para residentes. No se requiere identificación.', address:'1710 22nd St, Santa Monica', phone:'(310) 829-0041', website:'', hours:'Tue & Thu 10am–1pm', notes:'Bring reusable bags', notes_es:'Traiga bolsas reutilizables' },
  { name:'OPCC Mental Health Services', name_es:'Servicios de Salud Mental OPCC', category:'Mental', description:'Free counseling, crisis support, and mental health case management for low-income residents.', description_es:'Consejería gratuita y apoyo en crisis para residentes de bajos ingresos.', address:'1523 2nd St, Santa Monica', phone:'(310) 264-6646', website:'https://opcc.org', hours:'Mon–Fri 9am–5pm', notes:'Walk-ins welcome for crisis support', notes_es:'Se aceptan visitas sin cita para crisis' },
  { name:'St. Joseph Center', name_es:'Centro St. Joseph', category:'Rental', description:'Emergency rental assistance and eviction prevention for households facing housing instability.', description_es:'Asistencia de renta de emergencia y prevención de desalojos.', address:'204 Hampton Dr, Venice', phone:'(310) 396-6468', website:'https://stjosephctr.org', hours:'Mon–Fri 8:30am–5pm', notes:'Call ahead to schedule', notes_es:'Llame antes para hacer una cita' },
  { name:'Bet Tzedek Legal Services', name_es:'Servicios Legales Bet Tzedek', category:'Legal', description:'Free legal help for low-income tenants facing eviction, housing discrimination, or lease disputes.', description_es:'Ayuda legal gratis para inquilinos de bajos ingresos con problemas de vivienda.', address:'3250 Wilshire Blvd, Los Angeles', phone:'(323) 939-0506', website:'https://bettzedek.org', hours:'Mon–Fri 9am–5pm', notes:'Intake by phone first', notes_es:'Primero llame para evaluación' },
  { name:'DPSS — CalFresh / MediCal', name_es:'DPSS — CalFresh / MediCal', category:'Benefits', description:'Apply for CalFresh (food stamps), Medi-Cal health coverage, and CalWORKs cash assistance.', description_es:'Solicite CalFresh, Medi-Cal y ayuda económica CalWORKs.', address:'1111 E. Las Tunas Dr, San Gabriel', phone:'(800) 827-3777', website:'https://dpss.lacounty.gov', hours:'Mon–Fri 8am–5pm', notes:'Online applications available 24/7', notes_es:'Solicitudes en línea disponibles 24/7' },
  { name:'Step Up on Second', name_es:'Step Up on Second', category:'Mental', description:'Peer support, housing navigation, and wellness programs for adults with mental health challenges.', description_es:'Apoyo entre pares y programas de bienestar para adultos con desafíos de salud mental.', address:'1328 Second St, Santa Monica', phone:'(310) 394-6889', website:'https://stepuponsecond.org', hours:'Mon–Fri 9am–5pm', notes:'Drop-in wellness center available', notes_es:'Centro de bienestar de acceso libre disponible' },
  { name:'Human Services Division — City of SM', name_es:'División de Servicios Humanos', category:'Benefits', description:'Utility assistance, senior services, and emergency aid programs for Santa Monica residents.', description_es:'Asistencia de servicios públicos, servicios para personas mayores y ayuda de emergencia.', address:'1212 Main St, Santa Monica', phone:'(310) 458-8701', website:'https://santamonica.gov', hours:'Mon–Thu 8am–5:30pm', notes:'Income verification may be required', notes_es:'Puede requerirse verificación de ingresos' },
  { name:'Neighborhood Legal Services', name_es:'Servicios Legales del Vecindario', category:'Legal', description:'Free civil legal aid for low-income residents — housing, family law, and public benefits.', description_es:'Ayuda legal civil gratuita para residentes de bajos ingresos.', address:'Multiple locations in LA County', phone:'(800) 433-6251', website:'https://nlsla.org', hours:'Mon–Fri 9am–4pm', notes:'Remote appointments available', notes_es:'Citas remotas disponibles' },
];

const CAT_COLORS = {
  Food:'#e05c3a', Mental:'#7b5ea7', Rental:'#2e86c1', Legal:'#1a5276',
  Benefits:'#d48e00', Other:'#6b7280', Transportation:'#2a9d8f', Education:'#457b9d',
  Employment:'#e76f51', Childcare:'#c59b00', Youth:'#06b88a', Seniors:'#118ab2',
  Housing:'#2e86c1', Disability:'#9b5de5', Medical:'#e63946', 'Domestic Violence':'#b5338a',
};

let resources = [];
let lang = 'en';
let activeCategory = 'All';

const ICONS = {
  Food:'🥦', Mental:'🧠', Rental:'🏠', Legal:'⚖️', Benefits:'📋', Other:'🤝',
  Transportation:'🚌', Education:'📚', Employment:'💼', Childcare:'👶',
  Youth:'🧒', Seniors:'👴', Housing:'🏡', Disability:'🌼', Medical:'⚕️',
  'Domestic Violence':'🟣',
};

const CAT_LABELS = {
  en: {
    Food:'Food Pantries', Mental:'Mental Health', Rental:'Rental Assistance',
    Legal:'Legal Aid', Benefits:'Public Benefits', Other:'Other',
    Transportation:'Transportation', Education:'Education', Employment:'Employment',
    Childcare:'Childcare', Youth:'Youth', Seniors:'Seniors', Housing:'Housing',
    Disability:'Disability Services', Medical:'Medical Care', 'Domestic Violence':'Domestic Violence'
  },
  es: {
    Food:'Despensas', Mental:'Salud Mental', Rental:'Asistencia de Renta',
    Legal:'Ayuda Legal', Benefits:'Beneficios Públicos', Other:'Otros',
    Transportation:'Transporte', Education:'Educación', Employment:'Empleo',
    Childcare:'Cuidado Infantil', Youth:'Juventud', Seniors:'Personas Mayores',
    Housing:'Vivienda', Disability:'Discapacidad', Medical:'Atención Médica',
    'Domestic Violence':'Violencia Doméstica',
  },
};

function openReport(resourceName) {
  const subject = encodeURIComponent(T[lang].reportSubject(resourceName));
  const body    = encodeURIComponent(T[lang].reportBody(resourceName));
  const a = document.createElement('a');
  a.href = `mailto:${REPORT_EMAIL}?subject=${subject}&body=${body}`;
  a.click();
}

async function loadData() {
  if (!SHEET_URL) {
    document.getElementById('demo-notice').classList.add('show');
    resources = SAMPLE;
    buildFilters(); renderCards();
    return;
  }
  showLoading();
  try {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    resources = parseCSV(csv);
    buildFilters(); renderCards();
  } catch (e) {
    document.getElementById('demo-notice').classList.add('show');
    resources = SAMPLE;
    buildFilters(); renderCards();
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
  return lines.slice(1).map(line => {
    const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g) || [];
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/^"|"$/g,'').trim(); });
    return obj;
  }).filter(r => r.name || r.Name);
}

function buildFilters() {
  const categories = ['All', ...new Set(resources.map(r => r.category || r.Category || 'Other'))];
  const container = document.getElementById('filters');
  container.innerHTML = categories.map(cat => `
    <button class="filter-btn ${cat === activeCategory ? 'active' : ''}"
      onclick="setCategory('${cat}')">
      ${cat === 'All' ? T[lang].all : (CAT_LABELS[lang][cat] || cat)}
    </button>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  buildFilters(); renderCards();
}

function renderCards() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const grid  = document.getElementById('grid');

  const filtered = resources.filter(r => {
    const cat = r.category || r.Category || 'Other';
    const matchCat = activeCategory === 'All' || cat === activeCategory;
    const name = (lang === 'es' && r.name_es ? r.name_es : r.name || r.Name || '').toLowerCase();
    const desc = (lang === 'es' && r.description_es ? r.description_es : r.description || r.Description || '').toLowerCase();
    const matchQ = !query || name.includes(query) || desc.includes(query) || cat.toLowerCase().includes(query);
    return matchCat && matchQ;
  });

  document.getElementById('results-info').textContent = T[lang].showing(filtered.length);

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
      <h3>${T[lang].noResults}</h3>
      <p>${T[lang].noResultsSub}</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map((r, i) => {
    const cat     = (r.category || r.Category || 'Other').trim();
    const name    = lang === 'es' && r.name_es ? r.name_es : r.name || r.Name || '';
    const desc    = lang === 'es' && r.description_es ? r.description_es : r.description || r.Description || '';
    const notes   = lang === 'es' && r.notes_es ? r.notes_es : r.notes || r.Notes || '';
    const phone   = r.phone || r.Phone || '';
    const website = r.website || r.Website || '';
    const address = r.address || r.Address || '';
    const hours   = r.hours || r.Hours || '';

    return `
    <div class="card" style="animation-delay:${i*0.04}s">
      <div class="card-header">
        <div class="card-icon icon-${cat}">${ICONS[cat] || '🤝'}</div>
        <div>
          <div class="card-name">${name}</div>
          <div class="card-category">
            <span class="cat-dot cat-${cat}"></span>
            ${CAT_LABELS[lang][cat] || cat}
          </div>
        </div>
      </div>
      ${desc ? `<div class="card-desc">${desc}</div>` : ''}
      <div class="card-details">
        ${address ? `<div class="card-detail"><span class="icon">📍</span><span>${address}</span></div>` : ''}
        ${hours   ? `<div class="card-detail"><span class="icon">🕐</span><span>${hours}</span></div>` : ''}
        ${notes   ? `<div class="card-detail"><span class="icon">ℹ️</span><span>${notes}</span></div>` : ''}
      </div>
      <div class="card-actions">
        ${phone   ? `<a class="btn-call" href="tel:${phone.replace(/\D/g,'')}">📞 ${T[lang].call} ${phone}</a>` : ''}
        ${website ? `<a class="btn-web" href="${website}" target="_blank" rel="noopener">🔗 ${T[lang].website}</a>` : ''}
      </div>
      <div class="card-footer">
        <button class="btn-report" data-name="${name.replace(/"/g, '&quot;')}">${T[lang].reportBtn}</button>
      </div>
    </div>`;
  }).join('');
}

function showLoading() {
  document.getElementById('grid').innerHTML = `
    <div class="loading"><div class="spinner"></div><div>${T[lang].loading}</div></div>`;
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  document.getElementById('search').placeholder = T[l].search;
  document.getElementById('site-title').childNodes[0].textContent = T[l].siteTitle + ' ';
  document.getElementById('site-subtitle').textContent = T[l].siteSub;
  buildFilters(); renderCards();
}

document.getElementById('grid').addEventListener('click', function(e) {
  const btn = e.target.closest('.btn-report');
  if (!btn) return;
  openReport(btn.dataset.name);
});

loadData();
</script>
</body>
</html>
