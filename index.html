<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Resources · Community Corp Santa Monica</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #1a5276;
    --sky: #2e86c1;
    --sand: #eef2f7;
    --sun: #f0a500;
    --coral: #e05c3a;
    --mint: #d4efdf;
    --text: #1c1c1c;
    --muted: #6b7280;
    --card: #ffffff;
    --border: #e5e7eb;

    --c-Food:    #e05c3a;
    --c-Mental:  #7b5ea7;
    --c-Rental:  #2e86c1;
    --c-Legal:   #1a5276;
    --c-Benefits:#d48e00;
    --c-Other:   #6b7280;
    --c-Transportation: #2a9d8f;
    --c-Education: #457b9d;
    --c-Employment: #e76f51;
    --c-Childcare: #e9c46a;
    --c-Youth: #06d6a0;
    --c-Seniors: #118ab2;
    --c-Housing: #2e86c1;
    --c-Disability: #9b5de5;
    --c-Medical: #e63946;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ocean);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 18px 20px 14px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 700;
    line-height: 1.1;
  }

  h1 .sub {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.55em;
    font-weight: 300;
    opacity: 0.8;
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  .header-logo {
    height: 52px;
    width: auto;
    display: block;
    filter: brightness(0) invert(1);
    margin-bottom: 6px;
  }

  @media (max-width: 500px) { .header-logo { height: 40px; } }

  .lang-toggle {
    display: flex;
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .lang-toggle button {
    background: none;
    border: none;
    color: white;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .lang-toggle button.active {
    background: rgba(255,255,255,0.25);
    border-radius: 6px;
  }

  /* ── SEARCH + FILTER ── */
  .controls {
    max-width: 900px;
    margin: 28px auto 0;
    padding: 0 16px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 18px 14px 48px;
    border: 2px solid var(--border);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    background: white;
    outline: none;
    transition: border-color 0.2s;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .search-wrap input:focus { border-color: var(--sky); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
  }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding-bottom: 4px;
  }

  .filter-btn {
    border: 2px solid #b0bec5;
    background: white;
    border-radius: 10px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    color: #374151;
    box-shadow: 0 2px 0 #b0bec5, 0 2px 6px rgba(0,0,0,0.07);
    letter-spacing: 0.01em;
    user-select: none;
  }

  .filter-btn:hover {
    border-color: var(--sky);
    color: var(--sky);
    box-shadow: 0 2px 0 var(--sky), 0 3px 10px rgba(46,134,193,0.15);
    transform: translateY(-1px);
  }

  .filter-btn:active {
    transform: translateY(1px);
    box-shadow: 0 0px 0 #b0bec5;
  }

  .filter-btn.active {
    background: var(--ocean);
    border-color: #134261;
    color: white;
    box-shadow: 0 2px 0 #134261, 0 3px 10px rgba(26,82,118,0.25);
  }

  .filter-btn.active:hover {
    background: var(--sky);
    border-color: #1f6491;
    box-shadow: 0 2px 0 #1f6491, 0 3px 10px rgba(46,134,193,0.3);
    color: white;
  }

  /* ── RESULTS INFO ── */
  .results-info {
    max-width: 900px;
    margin: 20px auto 10px;
    padding: 0 16px;
    font-size: 13px;
    color: var(--muted);
  }

  .results-row {
    max-width: 900px;
    margin: 20px auto 10px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .results-row .results-info {
    margin: 0;
    padding: 0;
    flex: 1;
  }

  .category-share {
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  /* ── RESOURCE GRID ── */
  .grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: 16px;
    border: 2px solid #c9d4e0;
    padding: 20px;
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeUp 0.35s ease both;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 4px 16px rgba(26,82,118,0.10), 0 1px 4px rgba(26,82,118,0.06);
  }

  .card:hover {
    box-shadow: 0 12px 36px rgba(26,82,118,0.18), 0 3px 8px rgba(26,82,118,0.10);
    transform: translateY(-2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .icon-Food    { background: #fde8e2; }
  .icon-Mental  { background: #ede7f6; }
  .icon-Rental  { background: #dbeafe; }
  .icon-Legal   { background: #dbeafe; }
  .icon-Benefits{ background: #fef3c7; }
  .icon-Other   { background: #f3f4f6; }

  .card-name {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.25;
    color: var(--ocean);
  }

  .card-category {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .cat-dot {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    margin-right: 6px;
    flex-shrink: 0;
  }
  .cat-Food    { background: #e05c3a; }
  .cat-Mental  { background: #7b5ea7; }
  .cat-Rental  { background: #2e86c1; }
  .cat-Legal   { background: #1a5276; }
  .cat-Benefits{ background: #f0a500; }
  .cat-Other   { background: #6b7280; }

  .card-desc {
    font-size: 14px;
    line-height: 1.55;
    color: #374151;
  }

  .card-details {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 0;
    font-size: 13px;
    color: var(--muted);
  }

  .card-detail {
    display: flex;
    align-items: flex-start;
    gap: 7px;
  }

  .card-detail span.icon { flex-shrink: 0; }

  /* ── ACTION BUTTONS ROW ── */
  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 2px;
    justify-content: flex-start;
    align-items: center;
  }

  .btn-call, .btn-web {
    border: none;
    border-radius: 10px;
    padding: 9px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: opacity 0.15s, transform 0.15s;
  }

  .btn-call {
    background: var(--mint);
    color: #155724;
    box-shadow: 0 2px 0 #b7dfc6, 0 2px 6px rgba(21,87,36,0.10);
  }

  .btn-web  {
    background: #e8f0ff;
    color: #294f96;
    box-shadow: 0 2px 0 #bdd3ff, 0 2px 6px rgba(41,79,150,0.10);
  }

  .btn-call:hover, .btn-web:hover {
    opacity: 0.92;
    transform: translateY(-1px);
  }

  /* ── REPORT BUTTON ── */
  /*
   * The report button opens a pre-filled mailto: link.
   * Update REPORT_EMAIL at the top of the <script> block with the
   * staff inbox that should receive these reports.
   */
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: auto;
    padding-top: 6px;
    border-top: 1px solid rgba(201,212,224,0.55);
  }

  .share-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
  }

  .share-wrap.align-right .share-menu {
    left: auto;
    right: 0;
  }

  .btn-share {
    min-height: 30px;
    padding: 0 4px;
    border: none;
    background: transparent;
    color: #728195;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s, transform 0.15s;
    flex-shrink: 0;
  }

  .btn-share:hover {
    color: var(--ocean);
    transform: translateY(-1px);
  }

  .btn-share:active {
    transform: translateY(0);
  }

  .btn-share.top-share-btn {
    min-height: 32px;
    padding: 0 10px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid #d7dee8;
    border-radius: 10px;
    background: rgba(255,255,255,0.92);
    color: #60758a;
    transition: background 0.15s, border-color 0.15s, transform 0.15s, color 0.15s;
    box-shadow: 0 1px 2px rgba(15,23,42,0.04);
  }

  .btn-share.top-share-btn:hover {
    background: #f8fbff;
    border-color: #bfd0e4;
    color: var(--ocean);
  }

  .share-menu {
    position: absolute;
    left: 0;
    bottom: calc(100% + 8px);
    min-width: 138px;
    padding: 6px;
    border-radius: 12px;
    border: 1px solid #d7dee8;
    background: rgba(255,255,255,0.98);
    box-shadow: 0 14px 28px rgba(15,23,42,0.12), 0 3px 8px rgba(15,23,42,0.08);
    display: none;
    z-index: 20;
  }

  .share-menu.show {
    display: block;
  }

  .share-option {
    width: 100%;
    border: none;
    background: transparent;
    color: #425466;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 8px 10px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }

  .share-option:hover {
    background: #f4f8fc;
    color: var(--ocean);
  }

  .btn-report {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 10px;
    border-radius: 10px;
    border: 1px solid #f4cf75;
    background: transparent;
    color: #9a5a1d;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .btn-report:hover {
    background: #fff8e8;
    border-color: #e5b94f;
    color: #7c4513;
  }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    color: var(--ocean);
    margin-bottom: 8px;
  }

  /* ── LOADING ── */
  .loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--sky);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ── */
  footer {
    background: var(--ocean);
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 24px 16px;
    font-size: 13px;
    margin-top: 20px;
  }

  footer a { color: rgba(255,255,255,0.9); }

  /* ── NOTICE BANNER ── */
  .notice {
    background: #fef3c7;
    border-left: 4px solid var(--sun);
    max-width: 900px;
    margin: 16px auto 0;
    padding: 12px 16px;
    border-radius: 0 10px 10px 0;
    font-size: 13px;
    color: #78350f;
    display: none;
  }

  .notice.show { display: block; }

  body.share-mode .controls,
  body.share-mode .results-info,
  body.share-mode footer {
    display: none;
  }

  body.share-mode .grid {
    max-width: 680px;
    grid-template-columns: 1fr;
    padding-top: 28px;
  }

  body.share-mode .card {
    min-height: auto;
  }

  @media (max-width: 750px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.1rem; }
    h1 .sub { font-size: 0.6em; }
    .header-inner { padding: 10px 12px; }
    .header-logo { height: 32px; }
    .lang-toggle button { padding: 5px 10px; font-size: 12px; }
    .controls { margin-top: 14px; padding: 0 12px; }
    .search-wrap input { font-size: 16px; padding: 11px 12px 11px 40px; border-radius: 10px; }
    .filters {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 6px;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { flex-shrink: 0; font-size: 12px; padding: 8px 13px; }
    .results-row {
      padding: 0 12px;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    .results-info { padding: 0; }
    .category-share { justify-content: flex-start; }
    .grid { grid-template-columns: 1fr; padding: 0 12px 48px; gap: 12px; }
    .card { padding: 16px 14px; }
    .card-name { font-size: 0.98rem; }
    .card-desc { font-size: 13px; }
    .btn-call, .btn-web { font-size: 12px; padding: 7px 11px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <img src="ccsm_logo_web.png" alt="Community Corporation of Santa Monica" class="header-logo">
        <h1 id="site-title">
          Community Resources
          <span class="sub" id="site-subtitle">Find help near you · Santa Monica</span>
        </h1>
      </div>
      <div class="lang-toggle">
        <button class="active" onclick="setLang('en')" id="btn-en">EN</button>
        <button onclick="setLang('es')" id="btn-es">ES</button>
      </div>
    </div>
  </div>
</header>

<div class="notice" id="demo-notice">
  📋 <strong>Demo mode:</strong> Showing sample data. Connect your Google Sheet by updating the <code>SHEET_URL</code> in the code.
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search resources..." oninput="renderCards()" autocomplete="off">
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="results-row">
  <div class="results-info" id="results-info"></div>
  <div class="category-share" id="category-share"></div>
</div>
<div class="grid" id="grid"></div>

<footer>
  <div id="footer-title">Community Corporation of Santa Monica · Resident Services</div>
  <div id="footer-contact" style="margin-top:6px">Questions? Call <a href="tel:+13103950220">(310) 395-0220</a></div>
</footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// UPDATE THIS — staff inbox that receives "Report outdated info" emails
// ─────────────────────────────────────────────────────────────────────────────
const REPORT_EMAIL = 'mwitham@communitycorp.org';

const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbAtpa7kK10yL2QtdLHRx9q2VbuEIPNG6S2uMbWhQ1GsLGoYA3NqFAlp_E_w8xUGRdcLxT4V3gbiJD/pub?output=csv';

// Recommended Google Sheet columns:
// name, name_es, category, description, description_es, address, phone, website, hours, notes, notes_es
// The importer also accepts several human-friendly variations like "Name", "Resource Name", or "Phone Number".

const T = {
  en: {
    search: 'Search resources...',
    all: 'All',
    showing: n => `Showing ${n} resource${n===1?'':'s'}`,
    noResults: 'No resources found',
    noResultsSub: 'Try a different search or category.',
    call: 'Call',
    website: 'Website',
    hours: 'Hours',
    address: 'Address',
    notes: 'Notes',
    loading: 'Loading resources...',
    siteTitle: 'Community Resources',
    siteSub: 'Find help near you · Santa Monica',
    demoNotice: 'Demo mode: Showing sample data. Connect your Google Sheet by updating the SHEET_URL in the code.',
    footerTitle: 'Community Corporation of Santa Monica · Resident Services',
    footerContact: 'Questions? Call',
    reportBtn: 'Report outdated info',
    share: 'Share',
    shareEmail: 'Email',
    shareCopyLink: 'Copy link',
    reportSubject: name => `Outdated listing: ${name}`,
    reportBody: name =>
`Hi CCSM,

I noticed some information for "${name}" on the CCSM Community Resources page may be outdated.

𝗪𝗵𝗮𝘁 𝘀𝗵𝗼𝘂𝗹𝗱 𝗯𝗲 𝘂𝗽𝗱𝗮𝘁𝗲𝗱:

𝗖𝗼𝗿𝗿𝗲𝗰𝘁 𝗶𝗻𝗳𝗼𝗿𝗺𝗮𝘁𝗶𝗼𝗻:

Anything else we should know:

Thank you for keeping this resource up to date!`,
  },
  es: {
    search: 'Buscar recursos...',
    all: 'Todo',
    showing: n => `Mostrando ${n} recurso${n===1?'':'s'}`,
    noResults: 'No se encontraron recursos',
    noResultsSub: 'Intenta una búsqueda diferente o categoría.',
    call: 'Llamar',
    website: 'Sitio web',
    hours: 'Horario',
    address: 'Dirección',
    notes: 'Notas',
    loading: 'Cargando recursos...',
    siteTitle: 'Recursos Comunitarios',
    siteSub: 'Encuentra ayuda cerca · Santa Mónica',
    demoNotice: 'Modo de demostracion: Mostrando datos de ejemplo. Conecte su hoja de Google actualizando SHEET_URL en el codigo.',
    footerTitle: 'Community Corporation of Santa Monica · Servicios para Residentes',
    footerContact: 'Preguntas? Llame al',
    reportBtn: 'Reportar información desactualizada',
    share: 'Compartir',
    shareEmail: 'Correo',
    shareCopyLink: 'Copiar enlace',
    reportSubject: name => `Información desactualizada: ${name}`,
    reportBody: name =>
`Hola,

Noté que la información de "${name}" en la página de Recursos Comunitarios puede estar desactualizada.

𝗤𝘂é 𝗱𝗲𝗯𝗲 𝗮𝗰𝘁𝘂𝗮𝗹𝗶𝘇𝗮𝗿𝘀𝗲:

𝗜𝗻𝗳𝗼𝗿𝗺𝗮𝗰𝗶ó𝗻 𝗰𝗼𝗿𝗿𝗲𝗰𝘁𝗮:

Algo más que debamos saber:

Gracias por mantener este recurso actualizado!`,
  }
};

function getReportHref(resource) {
  const name = getLocalizedValue(resource, 'name');
  const boldName = toBoldUnicode(name);
  const params = new URLSearchParams({
    view: 'cm',
    fs: '1',
    to: REPORT_EMAIL,
    su: T[lang].reportSubject(name),
    body: T[lang].reportBody(boldName),
  });
  return 'https://mail.google.com/mail/?' + params.toString();
}

function getBasePageUrl() {
  return window.location.origin + window.location.pathname;
}

function getShareKey(resource) {
  return encodeURIComponent(getField(resource, 'name').trim());
}

function getSharePageUrl(resource) {
  return `${getBasePageUrl()}?share=${getShareKey(resource)}`;
}

function getCategorySharePageUrl(category) {
  return `${getBasePageUrl()}?category=${encodeURIComponent(category)}`;
}

function getResourceShareData(resource) {
  const name = getLocalizedValue(resource, 'name');
  const description = getLocalizedValue(resource, 'description');
  const website = normalizeWebsiteUrl(getField(resource, 'website'));
  const address = getField(resource, 'address');
  const phone = getField(resource, 'phone');
  const parts = [description, address, phone].filter(Boolean);
  const shareUrl = getSharePageUrl(resource);

  return {
    title: name || 'Community resource',
    text: parts.join(' · '),
    url: shareUrl,
  };
}

function getResourceEmailLines(resource, includeShareUrl = true) {
  const shareData = getResourceShareData(resource);
  const website = normalizeWebsiteUrl(getField(resource, 'website'));
  const lines = [
    shareData.title,
    getField(resource, 'address'),
    getField(resource, 'phone'),
    getLocalizedValue(resource, 'description'),
    website,
  ].filter(Boolean);

  if (includeShareUrl) {
    lines.push('', 'View resource:', shareData.url);
  }

  return lines;
}

function getShareEmailHref(resource) {
  const shareData = getResourceShareData(resource);
  const lines = getResourceEmailLines(resource);
  const params = new URLSearchParams({
    view: 'cm',
    fs: '1',
    su: shareData.title,
    body: lines.join('\n'),
  });
  return 'https://mail.google.com/mail/?' + params.toString();
}

function getCategoryShareData(category) {
  const label = CAT_LABELS[lang][category] || category;
  return {
    title: `${label} · Community Resources`,
    text: `Browse ${label.toLowerCase()} resources.`,
    url: getCategorySharePageUrl(category),
  };
}

function getCategoryShareEmailHref(category) {
  const shareData = getCategoryShareData(category);
  const categoryResources = resources.filter(resource => normalizeCategory(resource) === category);
  const lines = [
    shareData.title,
    '',
    ...categoryResources.flatMap((resource, index) => {
      const block = getResourceEmailLines(resource, false);
      return index === categoryResources.length - 1 ? block : [...block, ''];
    }),
    '',
    'View resources:',
    shareData.url,
  ].filter((line, index, array) => line || (index > 0 && array[index - 1] !== ''));
  const params = new URLSearchParams({
    view: 'cm',
    fs: '1',
    su: shareData.title,
    body: lines.join('\n'),
  });
  return 'https://mail.google.com/mail/?' + params.toString();
}

function closeShareMenus() {
  document.querySelectorAll('.share-menu.show').forEach(menu => menu.classList.remove('show'));
  document.querySelectorAll('.btn-share[aria-expanded="true"]').forEach(button => button.setAttribute('aria-expanded', 'false'));
}

function toggleShareMenu(idx, event) {
  event.stopPropagation();
  const menu = document.getElementById(`share-menu-${idx}`);
  const button = event.currentTarget;
  if (!menu) return;

  const isOpen = menu.classList.contains('show');
  closeShareMenus();

  if (!isOpen) {
    menu.classList.add('show');
    button.setAttribute('aria-expanded', 'true');
  }
}

async function copyResourceLink(idx) {
  const resource = filtered_cache[idx];
  if (!resource) return;

  const shareData = getResourceShareData(resource);
  const clipboardText = shareData.url;

  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(clipboardText);
      closeShareMenus();
      window.alert('Link copied to clipboard.');
      return;
    }

    window.prompt('Copy this link:', clipboardText);
  } catch (error) {
    window.prompt('Copy this link:', shareData.url);
  }
}

async function copyCategoryLink() {
  if (activeCategory === 'All') return;

  const shareUrl = getCategorySharePageUrl(activeCategory);

  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(shareUrl);
      closeShareMenus();
      window.alert('Link copied to clipboard.');
      return;
    }

    window.prompt('Copy this link:', shareUrl);
  } catch (error) {
    window.prompt('Copy this link:', shareUrl);
  }

async function loadData() {
  if (!SHEET_URL) {
    document.getElementById('demo-notice').classList.add('show');
    resources = SAMPLE;
    buildFilters(); renderCards();
    return;
  }
  showLoading();
  try {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    resources = parseCSV(csv);
    if (!resources.length) throw new Error('No resources found in sheet');
    buildFilters(); renderCards();
  } catch (e) {
    document.getElementById('demo-notice').classList.add('show');
    resources = SAMPLE;
    buildFilters(); renderCards();
  }
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }

    if (char === ',' && !inQuotes) {
      row.push(cell);
      cell = '';
      continue;
    }

    if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') i += 1;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = '';
      continue;
    }

    cell += char;
  }

  if (cell || row.length) {
    row.push(cell);
    rows.push(row);
  }

  if (!rows.length) return [];

  const headers = rows[0].map(value => value.trim());
  return rows.slice(1).map(values => {
    const obj = {};
    headers.forEach((header, index) => {
      obj[header] = (values[index] || '').trim();
    });
    return normalizeResource(obj);
  }).filter(r => getField(r, 'name'));
}

function normalizeKey(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .replace(/[_-]+/g, ' ')
    .replace(/\s+/g, ' ');
}

function getRawField(resource, key) {
  const direct = resource[key];
  if (direct != null && String(direct).trim()) return String(direct).trim();

  const normalizedTarget = normalizeKey(key);
  for (const [fieldName, value] of Object.entries(resource)) {
    if (normalizeKey(fieldName) === normalizedTarget && String(value || '').trim()) {
      return String(value).trim();
    }
  }

  return '';
}

function getAliasField(resource, aliases) {
  for (const alias of aliases) {
    const value = getRawField(resource, alias);
    if (value) return value;
  }
  return '';
}

function normalizeCategoryValue(value) {
  const cleaned = String(value || '').trim();
  if (!cleaned) return 'Other';
  const canonical = CATEGORY_ALIASES[normalizeKey(cleaned)];
  if (canonical) return canonical;
  return cleaned;
}

function normalizeResource(resource) {
  const normalized = {};

  Object.entries(FIELD_ALIASES).forEach(([field, aliases]) => {
    normalized[field] = getAliasField(resource, [field, ...aliases]);
  });

  normalized.category = normalizeCategoryValue(normalized.category);
  return normalized;
}

function getField(resource, key) {
  return getRawField(resource, key);
}

function getLocalizedValue(resource, key) {
  if (lang === 'es') {
    const localized = getField(resource, `${key}_es`);
    if (localized) return localized;
  }
  return getField(resource, key);
}

function normalizeCategory(resource) {
  return getField(resource, 'category') || 'Other';
}

function escapeHTML(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[char]));
}

function escapeAttr(value) {
  return escapeHTML(value);
}

function normalizePhoneHref(phone) {
  const digits = String(phone).replace(/[^\d+]/g, '');
  return digits.startsWith('+') ? digits : digits.replace(/\+/g, '');
}

function normalizeWebsiteUrl(url) {
  const trimmed = String(url).trim();
  if (!trimmed) return '';
  if (/^https?:\/\//i.test(trimmed)) return trimmed;
  if (/^[a-z]+:/i.test(trimmed)) return '';
  return `https://${trimmed}`;
}

function toBoldUnicode(value) {
  const boldMap = {
    A:'𝗔', B:'𝗕', C:'𝗖', D:'𝗗', E:'𝗘', F:'𝗙', G:'𝗚', H:'𝗛', I:'𝗜', J:'𝗝',
    K:'𝗞', L:'𝗟', M:'𝗠', N:'𝗡', O:'𝗢', P:'𝗣', Q:'𝗤', R:'𝗥', S:'𝗦', T:'𝗧',
    U:'𝗨', V:'𝗩', W:'𝗪', X:'𝗫', Y:'𝗬', Z:'𝗭',
    a:'𝗮', b:'𝗯', c:'𝗰', d:'𝗱', e:'𝗲', f:'𝗳', g:'𝗴', h:'𝗵', i:'𝗶', j:'𝗷',
    k:'𝗸', l:'𝗹', m:'𝗺', n:'𝗻', o:'𝗼', p:'𝗽', q:'𝗾', r:'𝗿', s:'𝘀', t:'𝘁',
    u:'𝘂', v:'𝘃', w:'𝘄', x:'𝘅', y:'𝘆', z:'𝘇',
    0:'𝟬', 1:'𝟭', 2:'𝟮', 3:'𝟯', 4:'𝟰', 5:'𝟱', 6:'𝟲', 7:'𝟳', 8:'𝟴', 9:'𝟵',
  };

  return Array.from(String(value)).map(char => boldMap[char] || char).join('');
}

function buildFilters() {
  const categories = ['All', ...new Set(resources.map(normalizeCategory))];
  const container = document.getElementById('filters');
  container.innerHTML = categories.map(cat => `
    <button class="filter-btn ${cat === activeCategory ? 'active' : ''}"
      type="button"
      data-category="${escapeAttr(cat)}">
      ${escapeHTML(cat === 'All' ? T[lang].all : (CAT_LABELS[lang][cat] || cat))}
    </button>
  `).join('');

  container.querySelectorAll('[data-category]').forEach(button => {
    button.addEventListener('click', () => setCategory(button.dataset.category));
  });
}

function setCategory(cat) {
  activeCategory = cat;
  buildFilters(); renderCards();
}

function renderCards() {
  if (shareResourceKey) {
    renderSharePage();
    renderCategoryShare();
    return;
  }

  const query = document.getElementById('search').value.toLowerCase().trim();
  const grid  = document.getElementById('grid');

  const filtered = resources.filter(r => {
    const cat = normalizeCategory(r);
    const matchCat = activeCategory === 'All' || cat === activeCategory;
    const name = getLocalizedValue(r, 'name').toLowerCase();
    const desc = getLocalizedValue(r, 'description').toLowerCase();
    const address = getField(r, 'address').toLowerCase();
    const notes = getLocalizedValue(r, 'notes').toLowerCase();
    const matchQ = !query || name.includes(query) || desc.includes(query) || address.includes(query) || notes.includes(query) || cat.toLowerCase().includes(query);
    return matchCat && matchQ;
  });

  filtered_cache = filtered;
  document.getElementById('results-info').textContent = T[lang].showing(filtered.length);
  renderCategoryShare();

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
      <h3>${T[lang].noResults}</h3>
      <p>${T[lang].noResultsSub}</p>
    </div>`;
    return;
  }

  document.body.classList.remove('share-mode');
  grid.innerHTML = filtered.map((r, i) => renderResourceCard(r, i)).join('');
}

function showLoading() {
  document.getElementById('grid').innerHTML = `
    <div class="loading"><div class="spinner"></div><div>${T[lang].loading}</div></div>`;
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  document.getElementById('search').placeholder = T[l].search;
  document.getElementById('site-title').childNodes[0].textContent = T[l].siteTitle + ' ';
  document.getElementById('site-subtitle').textContent = T[l].siteSub;
  document.getElementById('demo-notice').innerHTML = `📋 <strong>${escapeHTML(T[l].demoNotice.split(':')[0])}:</strong> ${escapeHTML(T[l].demoNotice.split(':').slice(1).join(':').trim())}`;
  document.getElementById('footer-title').textContent = T[l].footerTitle;
  document.getElementById('footer-contact').innerHTML = `${escapeHTML(T[l].footerContact)} <a href="tel:+13103950220">(310) 395-0220</a>`;
  buildFilters(); renderCards();
}

if (sharedCategoryKey) {
  activeCategory = sharedCategoryKey;
}

loadData();
</script>
</body>
</html>
